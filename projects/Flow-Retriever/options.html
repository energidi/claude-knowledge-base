<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
    <title>Flow Retriever - Options</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 13px;
            color: #3e3e3c;
            padding: 1.5rem 2rem;
            min-width: 280px;
            max-width: 400px;
        }
        h2 {
            font-size: 14px;
            font-weight: 600;
            margin: 0 0 1rem;
            color: #080707;
        }
        .setting-group {
            margin-bottom: 1.25rem;
        }
        .setting-label {
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: block;
        }
        label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.3rem 0;
            cursor: pointer;
        }
        #status {
            font-size: 12px;
            color: #2e844a;
            height: 1.2em;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <h2>Flow Retriever Settings</h2>

    <div class="setting-group">
        <span class="setting-label">Default action when clicking JSON</span>
        <label>
            <input type="radio" name="defaultAction" value="COPY">
            📋 Copy to clipboard
        </label>
        <label>
            <input type="radio" name="defaultAction" value="DOWNLOAD">
            ⬇ Download file
        </label>
    </div>

    <div id="status"></div>

    <script src="options.js"></script>
</body>
</html>
