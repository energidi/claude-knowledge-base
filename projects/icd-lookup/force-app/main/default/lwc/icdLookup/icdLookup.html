<template>
    <div class={formElementClass}>
        <div class="slds-form-element__label-container">
            <label id={_labelId} class="slds-form-element__label">
                <template lwc:if={isMandatory}>
                    <abbr class="slds-required" title="required">*</abbr>
                </template>
                {label}
            </label>
            <template lwc:if={tooltip}>
                <lightning-helptext content={tooltip}></lightning-helptext>
            </template>
        </div>
        <div class="slds-form-element__control">
            <div class="slds-combobox_container">
                <div class={dropdownClass}
                     onkeydown={handleDropdownKeydown}
                     onfocusout={handleFocusOut}>
                    <div class="slds-combobox__form-element slds-input-has-icon slds-input-has-icon_right" role="none">
                        <input
                            id="icd-input"
                            type="text"
                            role="combobox"
                            aria-haspopup="listbox"
                            aria-expanded={isOpen}
                            aria-labelledby={_labelId}
                            aria-owns="icd-listbox"
                            aria-controls="icd-listbox"
                            aria-activedescendant={activeDescendant}
                            aria-autocomplete="list"
                            aria-required={ariaRequired}
                            class="slds-input slds-combobox__input"
                            placeholder={fieldPlaceholder}
                            value={searchTerm}
                            oninput={handleSearchChange}>
                        <template lwc:if={searchTerm}>
                            <button
                                class="slds-button slds-button_icon slds-input__icon slds-input__icon_right"
                                title="Clear"
                                type="button"
                                onclick={handleClear}>
                                <lightning-icon icon-name="utility:clear" size="x-small" alternative-text="Clear"></lightning-icon>
                            </button>
                        </template>
                    </div>
                    <div class="slds-dropdown slds-dropdown_fluid">
                        <ul id="icd-listbox"
                            role="listbox"
                            class="slds-listbox slds-listbox_vertical">
                            <template lwc:if={isLoading}>
                                <li role="presentation" class="slds-listbox__item">
                                    <div class="slds-align_absolute-center slds-p-around_medium">
                                        <lightning-spinner alt="" size="small" variant="brand"></lightning-spinner>
                                    </div>
                                </li>
                            </template>
                            <template for:each={processedResults} for:item="res">
                                <li key={res.code}
                                    id={res.optionId}
                                    role="option"
                                    aria-selected={res.isSelected}
                                    class={res.itemClass}
                                    onmousedown={handleOptionMousedown}
                                    onclick={handleSelect}
                                    data-code={res.code}
                                    data-description={res.description}>
                                    <span class="slds-media slds-listbox__option slds-listbox__option_plain slds-media_center">
                                        <span class="slds-media__body">
                                            <span class="slds-truncate">
                                                <strong>{res.code}</strong>: {res.description}
                                            </span>
                                        </span>
                                    </span>
                                </li>
                            </template>
                            <template lwc:if={showNoResults}>
                                <li role="presentation" class="slds-listbox__item">
                                    <div role="status" class="slds-align_absolute-center slds-p-around_small slds-text-color_error no-results-message">
                                        {noResultsMessage}
                                    </div>
                                </li>
                            </template>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
        <template lwc:if={displayError}>
            <div class="slds-form-element__help" role="alert">{displayError}</div>
        </template>
        <div aria-live="polite" aria-atomic="true" class="slds-assistive-text">{screenReaderStatus}</div>
    </div>
</template>
