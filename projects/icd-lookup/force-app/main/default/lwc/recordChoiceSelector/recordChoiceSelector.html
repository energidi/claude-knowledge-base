<template>
    <div class="slds-form-element">
        <div class="slds-grid slds-grid_vertical-align-center slds-p-bottom_small">
            <template lwc:if={isRequired}>
                <abbr class="slds-required" title="required">*</abbr>
            </template>
            <span class="slds-form-element__label slds-m-bottom_none slds-p-right_xx-small">{label}</span>
            <template lwc:if={helpText}>
                <lightning-helptext content={helpText}></lightning-helptext>
            </template>
        </div>

        <div class="slds-form-element__control">
            <template lwc:if={showEmptyMessage}>
                <p class="slds-p-around_small slds-text-color_weak slds-text-align_center">No options available.</p>
            </template>
            <template for:each={options} for:item="item">
                <div key={item.id} class={wrapperClass}>

                    <input type={inputType}
                           name="record-choice-group"
                           id={item.id}
                           value={item.id}
                           checked={item.checked}
                           disabled={item.disabled}
                           data-id={item.id}
                           onchange={handleCheckboxChange} />

                    <template lwc:if={isRadio}>
                        <label class="slds-radio__label" for={item.id}>
                            <span class="slds-radio_faux"></span>
                            <span class="slds-form-element__label">{item.label}</span>
                        </label>
                    </template>

                    <template lwc:else>
                        <label class="slds-checkbox__label" for={item.id}>
                            <span class="slds-checkbox_faux"></span>
                            <span class="slds-form-element__label">{item.label}</span>
                        </label>
                    </template>

                </div>
            </template>
        </div>
    </div>
</template>
