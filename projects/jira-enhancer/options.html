<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Jira Enhancer Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 24px;
      max-width: 500px;
      margin: 0 auto;
      color: #172b4d;
    }
    h1 {
      font-size: 20px;
      margin-bottom: 24px;
    }
    .section {
      margin-bottom: 24px;
      padding-bottom: 24px;
      border-bottom: 1px solid #dfe1e6;
    }
    .section:last-child {
      border-bottom: none;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #dfe1e6;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #0052cc;
    }
    .hint {
      font-size: 12px;
      color: #6b778c;
      margin-top: 6px;
    }
    button {
      background: #0052cc;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover {
      background: #0065ff;
    }
    .status {
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 13px;
    }
    .status.success {
      background: #e3fcef;
      color: #006644;
    }
    .status.error {
      background: #ffebe6;
      color: #de350b;
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .checkbox-row input {
      width: auto;
    }
  </style>
</head>
<body>
  <h1>Jira Enhancer Settings</h1>

  <div class="section">
    <label>Jira Server/Data Center URL</label>
    <input type="text" id="serverUrl" placeholder="https://jira.yourcompany.com">
    <p class="hint">Only needed for self-hosted Jira. Leave empty for Jira Cloud.</p>
  </div>

  <div class="section">
    <label>API Token (Server/Data Center)</label>
    <input type="password" id="apiToken" placeholder="Personal Access Token">
    <p class="hint">Create a token in Jira: Profile > Personal Access Tokens</p>
  </div>

  <div class="section">
    <h3>Features</h3>
    <div class="checkbox-row">
      <input type="checkbox" id="enableFloatingHeader" checked>
      <label for="enableFloatingHeader">Floating title header</label>
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="enableCopyButtons" checked>
      <label for="enableCopyButtons">Quick copy buttons</label>
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="enableSearch" checked>
      <label for="enableSearch">Smart search modal</label>
    </div>
  </div>

  <button id="save">Save Settings</button>
  <div id="status" class="status" style="display: none;"></div>

  <script src="options.js"></script>
</body>
</html>
