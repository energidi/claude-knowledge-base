<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>קוף החלל</title>

  <!-- iOS PWA: hides Safari chrome when added to home screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen" />
  <meta name="apple-mobile-web-app-title" content="קוף החלל" />

  <!-- Android Chrome: hides browser UI on install -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#000000" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Portrait-mode rotate hint (shown only on touch devices in portrait) -->
  <div id="rotate-hint">
    <div class="rotate-icon">📱</div>
    <p>סובב את המכשיר לרוחב<br>לחוויית משחק מלאה</p>
    <button onclick="document.getElementById('rotate-hint').style.display='none'">המשך בכל זאת</button>
  </div>

  <!-- Main game canvas -->
  <div id="canvas-wrapper">
    <canvas id="gameCanvas"></canvas>
    <button id="btn-fullscreen" class="overlay-btn" aria-label="מסך מלא">⛶</button>
    <button id="btn-mute"       class="overlay-btn" aria-label="השתק מוזיקה">🔊</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
