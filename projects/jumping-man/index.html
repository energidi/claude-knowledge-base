<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>קוף החלל</title>

  <!-- iOS PWA: hides Safari chrome when added to home screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen" />
  <meta name="apple-mobile-web-app-title" content="קוף החלל" />

  <!-- Android Chrome: hides browser UI on install -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#000000" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Main game canvas -->
  <div id="canvas-wrapper">
    <canvas id="gameCanvas"></canvas>

    <!-- Fullscreen button (always visible) -->
    <button id="btn-fullscreen" aria-label="מסך מלא">⛶</button>

    <!-- Mobile on-screen controls (hidden on desktop via CSS media query) -->
    <div id="mobile-controls">
      <button id="btn-left"  class="ctrl-btn" aria-label="שמאל">&#8592;</button>
      <button id="btn-jump"  class="ctrl-btn jump-btn" aria-label="קפוץ">קפוץ</button>
      <button id="btn-right" class="ctrl-btn" aria-label="ימין">&#8594;</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
