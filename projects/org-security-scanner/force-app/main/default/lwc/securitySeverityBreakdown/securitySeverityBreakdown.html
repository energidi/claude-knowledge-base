<template>
    <lwc:if isTrue={hasScanRun}>

        <!-- Severity Breakdown -->
        <div class="section-header">Severity Breakdown</div>

        <ul class="severity-list" role="list">
            <template for:each={severityRows} for:item="row">
                <li
                    key={row.key}
                    class="severity-row"
                    role="button"
                    tabindex="0"
                    data-severity={row.key}
                    onclick={handleRowClick}
                    onkeydown={handleRowClick}
                    aria-label={"Filter by " + row.label}
                >
                    <span class="severity-dot" style={row.dotStyle}></span>
                    <span class="severity-label">{row.label}</span>
                    <div class="severity-bar-wrap">
                        <lightning-progress-bar
                            value={row.progressValue}
                            size="x-small"
                            style={row.progressStyle}
                        ></lightning-progress-bar>
                    </div>
                    <span class="severity-count">{row.count}</span>
                </li>
            </template>
        </ul>

        <!-- Quick Stats -->
        <div class="section-header section-header--stats">Quick Stats</div>

        <div class="stats-grid">
            <div class="stat-tile">
                <span class="stat-value">{openCount}</span>
                <span class="stat-label">Open</span>
            </div>
            <div class="stat-tile stat-tile--critical">
                <span class="stat-value">{criticalOpenCount}</span>
                <span class="stat-label">Critical</span>
            </div>
            <div class="stat-tile">
                <span class="stat-value stat-value--muted">{recommendationCount}</span>
                <span class="stat-label">Recommendations</span>
            </div>
        </div>

    </lwc:if>
</template>
