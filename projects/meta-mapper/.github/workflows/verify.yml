name: Verify

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Repo-wide formatting drift (201 files) has been an accepted, non-blocking condition
      # since Round 75 of the code review history - report it without failing the build
      # until it is cleaned up in a dedicated pass.
      - name: Prettier check (non-blocking)
        run: npm run prettier:verify
        continue-on-error: true

      - name: ESLint
        run: npm run lint

      - name: LWC Jest unit tests
        run: npm run test:unit

      - name: Dependency audit
        run: npm audit --audit-level=high
